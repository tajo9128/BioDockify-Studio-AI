version: '3.8'

services:
  biodockify:
    build:
      context: .
      dockerfile: Dockerfile.single
    ports:
      - "8000:8000"
    volumes:
      - biodockify-data:/app/data
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  biodockify-data:
