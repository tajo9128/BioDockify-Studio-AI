name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - single
          - full

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
       
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
       
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tajo9128
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" == *[!0-9]* ]]; then
            VERSION="latest"
          fi
          if [[ -z "$VERSION" || "$VERSION" == "main" ]]; then
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build and Push Single Container
        if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'single' || github.event_name != 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.single
          push: true
          tags: |
            tajo9128/docking-studio:latest
            tajo9128/docking-studio:${{ steps.version.outputs.VERSION }}
            biodockify/docking-studio:latest
            biodockify/docking-studio:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and Push Full Stack
        if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'full'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            tajo9128/docking-studio:full-latest
            tajo9128/docking-studio:full-${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Show pushed tags
        run: |
          echo "Docker image pushed:"
          echo "  Single: biodockify/docking-studio:${{ steps.version.outputs.VERSION }}"
          echo "  Full: tajo9128/docking-studio:full-${{ steps.version.outputs.VERSION }}"
